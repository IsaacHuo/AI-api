name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set image tags
        id: image
        run: |
          IMAGE="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          SHA_TAG="${IMAGE}:sha-${GITHUB_SHA}"
          echo "image_ref=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          echo "version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ vars.DEPLOY_PLATFORMS || 'linux/amd64' }}
          push: true
          build-args: |
            VERSION=${{ steps.image.outputs.version }}
            COMMIT=${{ github.sha }}
            DATE=${{ github.event.head_commit.timestamp || github.event.repository.updated_at }}
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Validate deployment secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          : "${DEPLOY_HOST:?Missing DEPLOY_HOST secret}"
          : "${DEPLOY_USER:?Missing DEPLOY_USER secret}"
          : "${DEPLOY_SSH_KEY:?Missing DEPLOY_SSH_KEY secret}"
          : "${DEPLOY_PATH:?Missing DEPLOY_PATH secret}"

      - name: Prepare SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          PORT="${DEPLOY_SSH_PORT:-22}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_COMPOSE_FILE: ${{ secrets.DEPLOY_COMPOSE_FILE || 'docker-compose.yml' }}
          IMAGE_REF: ${{ needs.build.outputs.image_ref }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          PORT="${DEPLOY_SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            'bash -s' -- "$DEPLOY_PATH" "$DEPLOY_COMPOSE_FILE" "$IMAGE_REF" "$GHCR_USERNAME" "$GHCR_TOKEN" <<'REMOTE'
          set -euo pipefail

          DEPLOY_PATH="$1"
          COMPOSE_FILE="$2"
          IMAGE_REF="$3"
          GHCR_USERNAME="${4:-}"
          GHCR_TOKEN="${5:-}"

          cd "$DEPLOY_PATH"

          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "$COMPOSE_FILE not found in $DEPLOY_PATH" >&2
            exit 1
          fi

          if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_TOKEN" ]; then
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT
          fi

          cat > docker-compose.deploy.override.yml <<EOF
          services:
            sub2api:
              image: ${IMAGE_REF}
          EOF

          docker compose -f "$COMPOSE_FILE" -f docker-compose.deploy.override.yml pull sub2api
          docker compose -f "$COMPOSE_FILE" -f docker-compose.deploy.override.yml up -d
          docker compose -f "$COMPOSE_FILE" -f docker-compose.deploy.override.yml ps
          REMOTE
